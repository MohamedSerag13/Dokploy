services:
  postgres:
    image: postgres:16
    container_name: teamflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-teamflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teamflow}
      POSTGRES_DB: ${POSTGRES_DB:-teamflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: teamflow-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
